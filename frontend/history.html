<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay — Historial</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="navbar-brand" href="dashboard.html">NEXUS<span>PAY</span></a>
    <div class="nav-user">
        <span id="nav-username"></span>
        <button class="btn-danger" onclick="logout()">Salir</button>
    </div>
</nav>

<div class="page-wrapper">

    <h1 class="page-title">Historial de movimientos</h1>

    <!-- Resumen -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem;">
        <div class="card" style="margin:0; text-align:center;">
            <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.5rem;">
                TOTAL RECIBIDO
            </div>
            <div style="font-size:1.4rem; font-weight:700; color:var(--green-primary);">
                +$<span id="total-credit">0.00</span>
            </div>
        </div>
        <div class="card" style="margin:0; text-align:center;">
            <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.5rem;">
                TOTAL ENVIADO
            </div>
            <div style="font-size:1.4rem; font-weight:700; color:var(--danger);">
                -$<span id="total-debit">0.00</span>
            </div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="card" style="padding:1rem 1.5rem;">
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
            <button class="filter-btn active" onclick="filterTransactions('ALL')">Todos</button>
            <button class="filter-btn" onclick="filterTransactions('CREDIT')">Recibidos</button>
            <button class="filter-btn" onclick="filterTransactions('DEBIT')">Enviados</button>
        </div>
    </div>

    <!-- Lista de transacciones -->
    <div class="card">
        <div id="transactions-list">
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <p>Cargando historial...</p>
            </div>
        </div>
    </div>

</div>

<style>
    .filter-btn {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        padding: 0.4rem 1rem;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
    }
    .filter-btn.active {
        background: var(--green-primary);
        border-color: var(--green-primary);
        color: #000;
        font-weight: 600;
    }
    .filter-btn:hover:not(.active) {
        border-color: var(--border-green);
        color: var(--green-primary);
    }
</style>

<script>
    const API = 'http://localhost:8081/api';

    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user) window.location.href = 'index.html';

    document.getElementById('nav-username').textContent = user.fullName;

    let allTransactions = [];
    let currentFilter = 'ALL';

    // Cargar todas las transacciones
    async function loadTransactions() {
        try {
            const res = await fetch(`${API}/wallet/${user.id}/transactions`);
            allTransactions = await res.json();

            // Calcular totales
            let totalCredit = 0;
            let totalDebit = 0;

            allTransactions.forEach(tx => {
                if (tx.type === 'CREDIT') totalCredit += parseFloat(tx.amount);
                else totalDebit += parseFloat(tx.amount);
            });

            document.getElementById('total-credit').textContent =
                totalCredit.toLocaleString('es-AR', { minimumFractionDigits: 2 });
            document.getElementById('total-debit').textContent =
                totalDebit.toLocaleString('es-AR', { minimumFractionDigits: 2 });

            renderTransactions();

        } catch (error) {
            console.error('Error cargando historial:', error);
        }
    }

    // Renderizar según filtro activo
    function renderTransactions() {
        const filtered = currentFilter === 'ALL'
            ? allTransactions
            : allTransactions.filter(tx => tx.type === currentFilter);

        const container = document.getElementById('transactions-list');

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <p>No hay movimientos para mostrar</p>
                </div>`;
            return;
        }

        container.innerHTML = filtered.map(tx => `
            <div class="transaction-item">
                <div class="transaction-icon ${tx.type === 'CREDIT' ? 'credit' : 'debit'}">
                    ${tx.type === 'CREDIT' ? '↓' : '↑'}
                </div>
                <div class="transaction-info">
                    <div class="transaction-desc">${tx.description}</div>
                    <div class="transaction-date">${formatDate(tx.timestamp)}</div>
                </div>
                <div class="transaction-amount ${tx.type === 'CREDIT' ? 'credit' : 'debit'}">
                    ${tx.type === 'CREDIT' ? '+' : '-'}$${parseFloat(tx.amount).toLocaleString('es-AR', { minimumFractionDigits: 2 })}
                </div>
            </div>
        `).join('');
    }

    // Filtrar transacciones
    function filterTransactions(type) {
        currentFilter = type;

        // Actualizar botones activos
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');

        renderTransactions();
    }

    function formatDate(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleDateString('es-AR', {
            day: '2-digit', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }

    function logout() {
        sessionStorage.removeItem('user');
        window.location.href = 'index.html';
    }

    loadTransactions();
</script>

</body>
</html>
