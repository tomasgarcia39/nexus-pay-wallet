<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay — Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="navbar-brand" href="dashboard.html">NEXUS<span>PAY</span></a>
    <div class="nav-user">
        <span id="nav-username">Cargando...</span>
        <button class="btn-danger" onclick="logout()">Salir</button>
    </div>
</nav>

<div class="page-wrapper">

    <!-- Tarjeta de saldo -->
    <div class="card-green">
        <div class="balance-label">Saldo disponible</div>
        <div class="balance-amount">
            <span>$</span><span id="balance-amount">0.00</span>
        </div>
        <div class="balance-reserved" id="balance-reserved"></div>
        <div class="account-number" id="account-number"></div>
    </div>

    <!-- Acciones rápidas -->
    <div class="quick-actions">
        <a href="transfer.html" class="action-btn">
            <div class="action-icon">💸</div>
            <div class="action-label">Transferir</div>
        </a>
        <a href="reservations.html" class="action-btn">
            <div class="action-icon">🔒</div>
            <div class="action-label">Reservas</div>
        </a>
        <a href="history.html" class="action-btn">
            <div class="action-icon">📋</div>
            <div class="action-label">Historial</div>
        </a>
    </div>

    <!-- Últimas transacciones -->
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
            <h2 class="page-title" style="margin:0; font-size:1.1rem;">Últimos movimientos</h2>
            <a href="history.html" style="color:var(--green-primary); font-size:0.85rem; text-decoration:none;">Ver todos →</a>
        </div>
        <div id="transactions-list">
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <p>Cargando movimientos...</p>
            </div>
        </div>
    </div>

</div>

<script>
    const API = 'http://localhost:8081/api';

    // Verificar sesión
    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user) window.location.href = 'index.html';

    // Mostrar nombre en navbar
    document.getElementById('nav-username').textContent = user.fullName;

    // Cargar saldo
    async function loadBalance() {
        try {
            const res = await fetch(`${API}/wallet/${user.id}/balance`);
            const data = await res.json();

            document.getElementById('balance-amount').textContent =
                parseFloat(data.availableBalance).toLocaleString('es-AR', { minimumFractionDigits: 2 });

            document.getElementById('account-number').textContent =
                '📇 ' + data.accountNumber;

            if (parseFloat(data.reservedBalance) > 0) {
                document.getElementById('balance-reserved').textContent =
                    `🔒 $${parseFloat(data.reservedBalance).toLocaleString('es-AR', { minimumFractionDigits: 2 })} reservado`;
            }
        } catch (error) {
            console.error('Error cargando saldo:', error);
        }
    }

    // Cargar últimas 5 transacciones
    async function loadTransactions() {
        try {
            const res = await fetch(`${API}/wallet/${user.id}/transactions`);
            const data = await res.json();

            const container = document.getElementById('transactions-list');

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>No hay movimientos todavía</p>
                    </div>`;
                return;
            }

            // Mostramos solo las últimas 5
            const recent = data.slice(0, 5);
            container.innerHTML = recent.map(tx => `
                <div class="transaction-item">
                    <div class="transaction-icon ${tx.type === 'CREDIT' ? 'credit' : 'debit'}">
                        ${tx.type === 'CREDIT' ? '↓' : '↑'}
                    </div>
                    <div class="transaction-info">
                        <div class="transaction-desc">${tx.description}</div>
                        <div class="transaction-date">${formatDate(tx.timestamp)}</div>
                    </div>
                    <div class="transaction-amount ${tx.type === 'CREDIT' ? 'credit' : 'debit'}">
                        ${tx.type === 'CREDIT' ? '+' : '-'}$${parseFloat(tx.amount).toLocaleString('es-AR', { minimumFractionDigits: 2 })}
                    </div>
                </div>
            `).join('');

        } catch (error) {
            console.error('Error cargando transacciones:', error);
        }
    }

    function formatDate(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleDateString('es-AR', {
            day: '2-digit', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }

    function logout() {
        sessionStorage.removeItem('user');
        window.location.href = 'index.html';
    }

    // Inicializar
    loadBalance();
    loadTransactions();
</script>

</body>
</html>
