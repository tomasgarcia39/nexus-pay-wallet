<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay — Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    

<div class="login-wrapper">
    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <h1>NEXUS<span>PAY</span></h1>
            <p>Tu billetera digital</p>
        </div>

        <!-- Tabs Login / Registro -->
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('login')">Iniciar sesión</button>
            <button class="tab-btn" onclick="showTab('register')">Registrarse</button>
        </div>

        <!-- Alerta -->
        <div id="alert" class="alert"></div>

        <!-- Formulario Login -->
        <div id="form-login">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="login-email" class="form-control" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" id="login-password" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn-green" onclick="login()">Ingresar</button>
        </div>

        <!-- Formulario Registro -->
        <div id="form-register" style="display:none">
            <div class="form-group">
                <label class="form-label">Nombre completo</label>
                <input type="text" id="reg-name" class="form-control" placeholder="Juan García">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="reg-email" class="form-control" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" id="reg-password" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn-green" onclick="register()">Crear cuenta</button>
        </div>

    </div>
</div>


<script src="js/index.js"></script>
</body>
</html>
